name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION: src/CommandSynergy.slnx
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    name: Build, Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure NUGET packages folder
        if: runner.os == 'Windows'
        run: |
          echo "##vso[task.setvariable variable=NUGET_PACKAGES]$env:USERPROFILE\.nuget\packages"
      - name: Configure NUGET packages folder (non-Windows)
        if: runner.os != 'Windows'
        run: |
          echo "NUGET_PACKAGES=$HOME/.nuget/packages" >> $GITHUB_ENV

      - name: Cache NuGet packages
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run tests
        run: |
          dotnet test ${{ env.SOLUTION }} -c Release --no-build --verbosity normal --logger trx;LogFileName=TestResults.trx || true

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6
