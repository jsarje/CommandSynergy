name: CD Containers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION: src/CommandSynergy.slnx
  REGISTRY: ghcr.io
  WEB_IMAGE: ${{ github.repository_owner }}/commandsynergy-web
  INGESTION_IMAGE: ${{ github.repository_owner }}/commandsynergy-ingestion

jobs:
  prepare:
    name: Prepare metadata
    if: github.repository == 'jsarje/CommandSynergy'
    runs-on: ubuntu-latest
    outputs:
      image_tags: ${{ steps.metadata.outputs.image_tags }}
    steps:
      - name: Compute image tags
        id: metadata
        shell: bash
        run: |
          TAG_REF="${GITHUB_REF#refs/tags/}"     # e.g. v1.2.3
          VERSION="${TAG_REF#v}"                 # e.g. 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ -z "$MAJOR" ]; then
            echo "Unable to parse major version from tag: $TAG_REF"
            exit 1
          fi

          IMAGE_TAGS="$VERSION;$MAJOR"

          if [ -n "$MINOR" ]; then
            IMAGE_TAGS="$IMAGE_TAGS;$MAJOR.$MINOR"
          fi

          if [[ "$VERSION" != *-* ]]; then
            IMAGE_TAGS="latest;$IMAGE_TAGS"
          fi

          IMAGE_TAGS="$IMAGE_TAGS;$TAG_REF"

          echo "image_tags=$IMAGE_TAGS" >> "$GITHUB_OUTPUT"

  validate:
    name: Build and test
    if: github.repository == 'jsarje/CommandSynergy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure NuGet packages folder
        run: echo "NUGET_PACKAGES=$HOME/.nuget/packages" >> "$GITHUB_ENV"

      - name: Cache NuGet packages
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln', '**/*.slnx') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION }} -c Release --no-build --verbosity normal --filter "Category!=LocalOnly"

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'jsarje/CommandSynergy'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            repository: commandsynergy-web
            dockerfile: ./src/dockerfile.webapp
          - name: ingestion
            repository: commandsynergy-ingestion
            dockerfile: ./src/dockerfile.ingestion
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          BASE_TAGS: ${{ needs.prepare.outputs.image_tags }}
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.repository }}
        run: |
          IFS=';' read -ra TAGS <<< "$BASE_TAGS"

          {
            for TAG in "${TAGS[@]}"; do
              [ -n "$TAG" ] || continue
              echo "$IMAGE_REPOSITORY:$TAG"
            done
          } > image-tags.txt

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat image-tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  release:
    name: Create GitHub release
    if: github.repository == 'jsarje/CommandSynergy'
    runs-on: ubuntu-latest
    needs:
      - publish
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Published multi-architecture container images:

            - `ghcr.io/${{ env.WEB_IMAGE }}:${{ github.ref_name }}`
            - `ghcr.io/${{ env.INGESTION_IMAGE }}:${{ github.ref_name }}`

            Packages:
            - https://github.com/${{ github.repository }}/pkgs/container/commandsynergy-web
            - https://github.com/${{ github.repository }}/pkgs/container/commandsynergy-ingestion
          generate_release_notes: true
